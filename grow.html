<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>昆蟲大解密 ｜ 昆蟲如何長大</title>
  <meta name="description" content="用 SVG 動畫對照完全變態（蝴蝶）與不完全變態（蝗蟲），逐階段配合文字說明昆蟲如何成長。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animation.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body data-page="grow">
  <header id="siteHeader"></header>
  <nav id="tabNav"></nav>

  <main>
    <h2 class="section-title">🦋 昆蟲如何長大</h2>
    <p class="lead">昆蟲長大的時候，身體會改變樣子，這叫做「變態」。有兩種不一樣的長大方式。</p>

    <div class="card">
      <h3>🎬 變態動畫：看昆蟲一步步長大</h3>
      <p>按「播放」或「下一階段」，圖和文字會一起告訴你每個階段發生什麼事。</p>
      <div class="morph-tabs">
        <button class="btn" data-type="complete">完全變態（蝴蝶）</button>
        <button class="btn secondary" data-type="incomplete">不完全變態（蝗蟲）</button>
      </div>

      <div class="morph-stage" id="morphWidget">
        <div class="morph-svg-wrap">
          <svg viewBox="0 0 300 200" width="100%" role="img" aria-label="昆蟲變態各階段示意圖，會隨步驟更換">
            <!-- 地面 / 葉面基準 -->
            <ellipse cx="150" cy="185" rx="140" ry="14" fill="#bfe39a"/>

            <!-- ============ 完全變態 ============ -->
            <g class="morph-set" data-type="complete">
              <!-- 卵：葉子背面的卵塊 -->
              <g class="morph-fig" data-fig="egg">
                <path d="M50 120 Q150 70 250 120 Q200 150 150 146 Q100 150 50 120 Z" fill="#9ccc65" stroke="#6f9e3f" stroke-width="3"/>
                <path d="M60 120 Q150 100 244 120" stroke="#6f9e3f" stroke-width="2.5" fill="none"/>
                <g fill="#fff6d4" stroke="#e0c46a" stroke-width="1.5">
                  <ellipse cx="135" cy="128" rx="6" ry="8"/><ellipse cx="150" cy="131" rx="6" ry="8"/>
                  <ellipse cx="165" cy="128" rx="6" ry="8"/><ellipse cx="142" cy="118" rx="6" ry="8"/>
                  <ellipse cx="158" cy="118" rx="6" ry="8"/>
                </g>
              </g>

              <!-- 幼蟲：毛毛蟲（分節、足、頭） -->
              <g class="morph-fig" data-fig="larva" hidden>
                <!-- 食痕葉 -->
                <path d="M40 150 Q70 130 60 150 Q70 168 40 162 Z" fill="#aed581" opacity=".7"/>
                <!-- 身體分節 -->
                <g fill="#8bc34a" stroke="#558b2f" stroke-width="2">
                  <circle cx="200" cy="120" r="17"/><circle cx="178" cy="123" r="18"/>
                  <circle cx="155" cy="124" r="18"/><circle cx="132" cy="124" r="18"/>
                  <circle cx="110" cy="123" r="17"/>
                </g>
                <!-- 背部斑紋 -->
                <g fill="#558b2f"><circle cx="200" cy="112" r="2.5"/><circle cx="178" cy="114" r="2.5"/><circle cx="155" cy="115" r="2.5"/><circle cx="132" cy="115" r="2.5"/></g>
                <!-- 頭 -->
                <circle cx="92" cy="120" r="14" fill="#33691e"/>
                <circle cx="86" cy="116" r="3" fill="#fff"/>
                <!-- 腹足 -->
                <g stroke="#558b2f" stroke-width="4" stroke-linecap="round">
                  <path d="M132 140 v10"/><path d="M155 141 v10"/><path d="M178 140 v10"/><path d="M200 137 v10"/>
                </g>
              </g>

              <!-- 蛹：垂掛的蛹（絲、懸垂角度） -->
              <g class="morph-fig" data-fig="pupa" hidden>
                <!-- 樹枝 -->
                <path d="M70 55 H230" stroke="#8d6e63" stroke-width="7" stroke-linecap="round"/>
                <!-- 絲（懸器） -->
                <path d="M150 58 L150 78" stroke="#bcaaa4" stroke-width="2.5"/>
                <!-- 蛹體（上寬下尖、略彎的 J） -->
                <path d="M150 78 Q124 92 128 130 Q136 162 152 160 Q172 152 172 116 Q170 88 150 78 Z"
                      fill="#7d9b53" stroke="#5b7038" stroke-width="3"/>
                <!-- 翅與體節輪廓 -->
                <path d="M150 92 Q140 110 146 140" stroke="#5b7038" stroke-width="2" fill="none"/>
                <path d="M140 104 H162 M140 120 H164 M143 136 H160" stroke="#5b7038" stroke-width="1.6"/>
                <!-- 金點 -->
                <g fill="#ffd54f"><circle cx="150" cy="100" r="2"/><circle cx="156" cy="112" r="2"/></g>
              </g>

              <!-- 成蟲：蝴蝶（前後翅、棒狀觸角） -->
              <g class="morph-fig" data-fig="adult" hidden>
                <!-- 觸角 -->
                <path d="M150 78 Q140 58 132 56" stroke="#5a3a14" stroke-width="2.5" fill="none"/>
                <path d="M150 78 Q160 58 168 56" stroke="#5a3a14" stroke-width="2.5" fill="none"/>
                <circle cx="131" cy="55" r="3.5" fill="#5a3a14"/><circle cx="169" cy="55" r="3.5" fill="#5a3a14"/>
                <!-- 前翅 -->
                <path d="M150 92 Q92 56 86 104 Q104 122 150 112 Z" fill="#ff8f3f" stroke="#d2691e" stroke-width="2"/>
                <path d="M150 92 Q208 56 214 104 Q196 122 150 112 Z" fill="#ff8f3f" stroke="#d2691e" stroke-width="2"/>
                <!-- 後翅 -->
                <path d="M150 112 Q100 124 112 158 Q140 168 150 134 Z" fill="#ffb066" stroke="#d2691e" stroke-width="2"/>
                <path d="M150 112 Q200 124 188 158 Q160 168 150 134 Z" fill="#ffb066" stroke="#d2691e" stroke-width="2"/>
                <!-- 翅斑 -->
                <g fill="#fff3c4"><circle cx="118" cy="92" r="6"/><circle cx="182" cy="92" r="6"/></g>
                <!-- 身體 -->
                <ellipse cx="150" cy="120" rx="6" ry="36" fill="#5a3a14"/>
              </g>
            </g>

            <!-- ============ 不完全變態 ============ -->
            <g class="morph-set" data-type="incomplete" hidden>
              <!-- 卵：土裡的卵塊 -->
              <g class="morph-fig" data-fig="i-egg">
                <rect x="40" y="120" width="220" height="60" fill="#c9a06a" opacity=".55"/>
                <path d="M40 120 H260" stroke="#a07840" stroke-width="2.5" stroke-dasharray="6 5"/>
                <!-- 草 -->
                <path d="M70 120 q-3 -16 4 -26 M80 120 q4 -14 -2 -24" stroke="#7cb342" stroke-width="3" fill="none"/>
                <!-- 卵莢 -->
                <g fill="#fff6d4" stroke="#e0c46a" stroke-width="1.5">
                  <ellipse cx="150" cy="146" rx="6" ry="11"/><ellipse cx="138" cy="150" rx="6" ry="11"/>
                  <ellipse cx="162" cy="150" rx="6" ry="11"/><ellipse cx="150" cy="160" rx="6" ry="11"/>
                </g>
              </g>

              <!-- 若蟲：像縮小版成蟲、無翅、有翅芽 -->
              <g class="morph-fig" data-fig="i-nymph" hidden>
                <!-- 身體 -->
                <ellipse cx="160" cy="128" rx="40" ry="16" fill="#9ccc65" stroke="#689f38" stroke-width="2"/>
                <!-- 翅芽（小） -->
                <path d="M168 116 Q186 112 184 128 Q172 130 168 122 Z" fill="#aed581" stroke="#689f38" stroke-width="1.5"/>
                <!-- 頭 -->
                <circle cx="120" cy="124" r="14" fill="#7cb342" stroke="#689f38" stroke-width="1.5"/>
                <circle cx="114" cy="120" r="3" fill="#222"/>
                <path d="M126 112 Q116 92 108 92" stroke="#558b2f" stroke-width="2.5" fill="none"/>
                <!-- 大後腿 + 前足 -->
                <path d="M178 138 L196 124 L198 150" stroke="#558b2f" stroke-width="5" fill="none" stroke-linecap="round"/>
                <g stroke="#558b2f" stroke-width="4" stroke-linecap="round">
                  <path d="M140 142 v14"/><path d="M156 142 v14"/>
                </g>
              </g>

              <!-- 成蟲：蝗蟲（長翅、強健後腿、觸角） -->
              <g class="morph-fig" data-fig="i-adult" hidden>
                <!-- 身體 -->
                <ellipse cx="150" cy="120" rx="44" ry="16" fill="#8bc34a" stroke="#558b2f" stroke-width="2"/>
                <!-- 長翅（折在背上） -->
                <path d="M150 110 Q206 104 200 126 Q170 130 150 124 Z" fill="#aed581" stroke="#558b2f" stroke-width="2"/>
                <path d="M160 112 Q200 110 196 124" stroke="#558b2f" stroke-width="1.4" fill="none"/>
                <!-- 頭 -->
                <circle cx="106" cy="118" r="14" fill="#7cb342" stroke="#558b2f" stroke-width="1.5"/>
                <circle cx="100" cy="114" r="3" fill="#222"/>
                <path d="M112 104 Q104 82 96 80" stroke="#558b2f" stroke-width="3" fill="none"/>
                <!-- 強健後腿（折角） -->
                <path d="M170 132 L196 116 L200 150" stroke="#558b2f" stroke-width="6" fill="none" stroke-linecap="round"/>
                <!-- 前足 -->
                <g stroke="#558b2f" stroke-width="4" stroke-linecap="round">
                  <path d="M126 134 v16"/><path d="M146 134 v16"/>
                </g>
              </g>
            </g>
          </svg>
        </div>

        <div class="stage-labels" id="morphLabels"></div>
        <p class="feedback" id="morphCaption" style="text-align:center"></p>
        <p class="morph-desc" id="morphDesc"></p>
        <div class="controls" style="justify-content:center">
          <button class="btn" id="morphPlay">▶ 播放</button>
          <button class="btn secondary" id="morphStep">下一階段 ⏭</button>
          <button class="btn secondary" id="morphReset">🔄 重設</button>
        </div>
      </div>
    </div>

    <div class="grid grid-2">
      <div class="card" id="completeBox"><h3>🦋 完全變態：身體大改造</h3></div>
      <div class="card" id="incompleteBox"><h3>🦗 不完全變態：慢慢長大</h3></div>
    </div>

    <div class="card" id="moltBox"></div>
  </main>

  <div id="footNav"></div>
  <footer id="siteFooter"></footer>

  <script src="js/progress.js"></script>
  <script src="js/chrome.js"></script>
  <script src="js/interactions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
